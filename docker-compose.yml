services:
  app:
    build: .
    ports:
      - "8787:8787"
    environment:
      PORT: 8787
      DATABASE_URL: postgresql://creator:creator_password@db:5432/creator_sat_set?schema=public
      APP_STATE_ID: creator-sat-set
      LOGIN_PIN: ${LOGIN_PIN:-123456}
      PIN_SESSION_SECRET: ${PIN_SESSION_SECRET:-change-this-long-random-secret}
      PIN_SESSION_TTL_MS: ${PIN_SESSION_TTL_MS:-604800000}
      AI_PROVIDER: ${AI_PROVIDER:-9router}
      AI_PROVIDER_ORDER: ${AI_PROVIDER_ORDER:-9router}
      AI_FALLBACK: ${AI_FALLBACK:-false}
      NINE_ROUTER_API_KEY: ${NINE_ROUTER_API_KEY:-}
      NINE_ROUTER_MODEL: ${NINE_ROUTER_MODEL:-content-ai}
      NINE_ROUTER_ENDPOINT: ${NINE_ROUTER_ENDPOINT:-https://9router.crsdigi.tech/v1}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: creator
      POSTGRES_PASSWORD: creator_password
      POSTGRES_DB: creator_sat_set
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creator -d creator_sat_set"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
