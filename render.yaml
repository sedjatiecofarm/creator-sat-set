services:
  - type: web
    name: creator-sat-set
    env: docker
    plan: free
    envVars:
      - key: PORT
        value: 8787
      - key: DATABASE_URL
        sync: false
      - key: APP_STATE_ID
        value: creator-sat-set
      - key: AI_PROVIDER
        value: gemini
      - key: AI_PROVIDER_ORDER
        value: gemini,openrouter,groq
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
