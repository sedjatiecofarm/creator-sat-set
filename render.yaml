services:
  - type: web
    name: creator-sat-set
    env: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 8787
      - key: AI_PROVIDER
        value: gemini
      - key: AI_PROVIDER_ORDER
        value: gemini,openrouter,groq
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: SUPABASE_TABLE
        value: creator_app_state
      - key: SUPABASE_STATE_ID
        value: creator-sat-set

